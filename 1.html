<!DOCTYPE html>
<html>
<head>
    <title>CSS Background Properties</title>
    <style>
        body { background-color: yellow; }
        #header { background-color: orange; font-size: 20px; }
        .isi { text-indent: 2cm; font-size: 14px; color: red; }
        h1, p { color: blue; text-align: center; }
        p.hijau { color: green; letter-spacing: 12px; }
    </style>
</head>
<body>
    <h1 id="header">Selamat Datang</h1>
    <h2>Di website kami</h2>
    <p class="hijau">www.websitesaya.com</p>
    <p class="isi">Website ini adalah forum diskusi mahasiswa.</p>
    <h3>Website ini adalah forum diskusi mahasiswa.</h3>
    <h3>Website ini adalah forum diskusi mahasiswa.</h3>
    <p>Selamat berdiskusi</p>
</body>
</html>
